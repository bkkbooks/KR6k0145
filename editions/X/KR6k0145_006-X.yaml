  text: 大宋餘杭沙門元照錄八無根謗戒二初標名二六下正釋二初通釋二初列章二初下隨釋六初制意二釋名三罪多少二初標二問下釋二初據論唯單犯二初問答二轉難二初約殺盜難合謗二引論結輕難殺盜二今下約義通兩犯四結分齊五具緣二初標二初下釋三初釋第一緣二初正明二若下釋難三初難大小隨舉犯同二難僧尼互隨兩別三問尼眾打謗不同二二下依古出第二緣二初出古兩釋二初初師局淨境二初立義二若下釋疑二初引律文通穢難二引打戒例問難二又下次師通淨穢二上下明今所取二初引文證義二問答釋疑二初牒難二答釋三二下列後七緣六闕緣二就下牒釋二初戒緣二初標二沓下釋二初沓婆二初正示二釋疑三初問營事二問佛贊三問放光二初問放光之意二問事亂發光二慈地二就下戒本二初總分二第下別釋六初示初句二第二句二初釋文二釋注二初牒文二有下引釋二初古解二今解三第三句四合釋四五二句二初釋加謗二初釋文二釋注二初委釋根相二初通釋二初正明二問答二初問立根名二初問答立義二展轉立難四初無見聞非根難二舉罪相並難三無根有起難四舉根不成難二問不立觸知二初問答釋通二引小妄以難二初敘難二答釋二初釋謗妄相別二若下明觸通疑根二就下消文二初分三段二就下釋第二二初正釋二轉難四初小謗見語難二互生有無難三引注相違難四見聞通塞難二疏下結示古今二文下釋謗情二初釋文二釋注五若下第六句三初釋自言二初釋文二釋注二知下釋首詞三我下釋盡露六若下第七句二初點文二釋注二初釋犯二初分示二初以義科分二就下三種料簡二初標分二就下隨釋三初謗覆說他二初總分二就下隨釋二初別明四重二初標示二問答二初問輕重不同二問多少差別二次下合示逆難二初標二謗下釋二初明謗戒二說下明覆說二自謗覆說二初正示三位二引謗難說三僧尼互謗覆說二初標二初下釋二初明互謗二說下明互覆說二初雙標二僧下別釋二初互覆二初正示二釋疑二互說二注下牒釋二初釋餘謗二問惡說二就下釋不犯九假根謗戒二初標名二此下正釋二初簡異指同二牒文略釋二初戒緣二就下戒本二初指文句二就下釋第三二初釋異分二初釋文二釋注二非下指餘文二釋四諫戒二初總解二初標列二初下隨釋四初明同篇諫不諫二初標二須下釋二初約五意簡二初正明二初列示五意三初列三意二四明倚濫二初正明前後須不二就下略示倚濫所由三五明堅執二初標示二釋難二僧下他宗一意二上下結顯二又下以二義明二初標示二事下別釋二初明為事二明為人二明所為破僧二初標二如下釋二初敘意分章二初下隨章別釋四初名體差別二初標二僧下釋二初釋名三初正釋二摩下引示二初伽論二據下本律三上下顯破義二明體二對明二破二初標示二初下隨釋二初先定輪體二初標示二所下隨釋二初約行二就教二後對論破二初標示二初下隨釋九初就人二假佛三就數四就界五就凡聖六就方七就時二初引論通明二所下別釋前後二初引昔解二引論釋八就罪九明報三破僧時處二初標二初下釋三初正明二故下引證三問答四二逆因果最初三初標二如下釋二初明出血罪二初昔解二今解二初正明二釋難二初有犯名淨難二若下犯餘無破難二破下破僧罪二初定究竟二是下明第二二初正明二例難三問答三初問比丘犯逆二問諫有無三問俗犯逆二初釋通二引難三明立戒重單四明諫同罪別二初總標二昔下隨釋二初明輕重二初斥古立今二問答釋疑二初義諫前同吉二難同犯所以二問下舉不舉二第下別釋四十破僧違諫戒二初標名二意下隨釋二初通釋二初總標二言下別釋四初制意三初不聽破意二須諫意三結罪意二釋名三具緣四闕緣二就下別釋二初戒緣二就下戒本二初總分二就下別釋三初釋第一雙二初所諫人二欲下所諫事二初總分二就下牒釋三初釋始心二初分文二就下解釋二初釋初句三初通示文注二一下牒釋十八法九初法非法二律非律三多下犯非犯四言下若輕若重二初引多論釋二引了論分句五有殘無殘二初引多論二引了論二初正引二釋疑六言下麤惡非麤惡二初引母論釋二引句論分句七常所行非常所行八制非制九說非說二初約制教二了下約化教三即下總結懷意二言下釋後二句二方下釋立邪三堅下釋行化二第二雙二初標示二就下隨釋二初屏諫二初料簡僧屏二初總示二初下別釋十如文二就下正釋屏諫二初分文二初下隨釋二初釋文二初牒過知非二二下勸同和相二初總分二就下隨釋二初舉喻示諫二初釋法二初勸體同二勸行同二如下釋喻二二下舉益示諫二點注二是下拒屏諫三第三雙一隻二初釋僧諫二初釋文二釋注二不下釋拒諫結罪二初釋文二初略點二問答二初問攬因成果二躡前轉難二初躡義四蘭二轉難蘭因三初問答釋通二引吉並難三因明差別二初總示二一下別釋釋十如文二就下辨注二初釋犯二不犯十一助破違諫戒二初標名二眾下正釋二初通釋三初釋名二初今釋二有下引古解三初正解二問下遮妨二初引當戒以問二躡前戒轉難三然下結斥二具緣三闕緣二就下牒釋二初戒緣二初分文二就下牒釋二就下戒本三初總指二就下牒釋三初第一雙二初所諫人二初釋文二釋注二二下所諫事二初標分二初下隨釋二初釋文二初明遮僧不聽二就下出不聽道理二點注二二下第二雙二初屏諫二四下拒屏諫三彼下第三雙三本下點示十二汙家擯謗戒二初標名二四下正釋二初通釋二初總標二初下隨釋四初制